<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intellectually Questionable</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero-shell">
      <video class="hero-video" autoplay muted loop playsinline>
        <source src="hero.mp4" type="video/mp4" />
      </video>
      <div class="hero-overlay"></div>

      <div class="hero-controls top-left">
        <button class="button secondary audio-toggle" id="audioToggle" type="button" aria-pressed="false">🔊 Play Audio</button>
      </div>

      <div class="hero-controls top-right">
        <a class="button secondary glitch-link" href="thoughts.html">[enter archives]</a>
      </div>

      <div class="hero-content">
        <div class="hero-copy">
          <h1>INTELLECTUALLY<br />QUESTIONABLE</h1>
          <p class="hero-text">A public archive of private thinking.</p>
        </div>
      </div>
    </header>

    <footer class="site-footer">
      <p>This is not advice.</p>
      <p>It's evidence of thinking.</p>
    </footer>

    <script>
      const video = document.querySelector('.hero-video');
      const audioToggle = document.getElementById('audioToggle');

      if (video && audioToggle) {
        audioToggle.addEventListener('click', () => {
          video.muted = !video.muted;
          audioToggle.textContent = video.muted ? '🔊 Play Audio' : '🔈 Pause Audio';
          audioToggle.setAttribute('aria-pressed', String(!video.muted));
        });
      }
    </script>
  </body>
</html>
